        /* SÉLECTEUR DE LANGUE ULTRA-FIN ET DÉCALÉ */

            position: fixed;

            background: rgba(0, 0, 0, 0.9); 
            border: 1px solid var(--gold); 
            color: white; 
            border-radius: 4px;

        #lock-screen { position: fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:9999; display:flex; flex-direction:column; align-items:center; justify-content:center; }
        
        /* ON DESCEND L'INTERFACE POUR LAISSER RESPIRER LE HAUT */

        function translateAll(lang) {
            const d = translations[lang] || translations['fr'];
            document.body.style.direction = (lang === 'ar') ? 'rtl' : 'ltr';
            document.getElementById('l-title').innerText = d.lTitle; document.getElementById('l-btn').innerText = d.lBtn;
            document.getElementById('m-dash').innerText = d.mDash; document.getElementById('m-pay').innerText = d.mPay;
            document.getElementById('m-inscr').innerText = d.mInscr; document.getElementById('m-macro').innerText = d.mMacro;
            document.getElementById('m-faq').innerText = d.mFaq; document.getElementById('t-config').innerText = d.tConfig;
            document.getElementById('l-cap').innerText = d.lCap; document.getElementById('l-ex').innerText = d.lEx;
            document.getElementById('l-mkt').innerText = d.lMkt; document.getElementById('t-btn-launch').innerText = d.tBtn;
            document.getElementById('t-team').innerText = d.tTeam;

            let tHtml = ""; d.team.forEach(m => { tHtml += `<div class="member"><span>${m.d}</span> <b>${m.n}</b><br><small>${m.r}</small></div>`; });
            document.getElementById('team-list').innerHTML = tHtml;

            let fHtml = ""; d.faq.forEach(f => { fHtml += `<div style="margin-bottom:8px;"><b>${f.q}</b><br><small style="color:#888;">${f.a}</small></div>`; });
            document.getElementById('faq-container').innerHTML = fHtml;
        }

        function forceUnlock() { if(document.getElementById('pass-code').value === "197800") { document.getElementById('lock-screen').style.display = "none"; document.getElementById('main-interface').style.display = "block"; translateAll('fr'); updateTime(); } }
        function showTab(id, el) { document.querySelectorAll('.content-section').forEach(s => s.style.display='none'); document.getElementById(id).style.display='block'; document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active')); el.classList.add('active'); }
        function updateTime() { document.getElementById('ny-time').innerText = "NY: " + new Date().toLocaleTimeString('fr-FR', {timeZone:'America/New_York'}); setTimeout(updateTime, 1000); }
        function copyWallet() { const addr = document.getElementById('wallet-id').innerText; navigator.clipboard.writeText(addr); alert("ADRESSE COPIÉE !"); }
        
        async function moteurScanManuel() {
            const sym = document.getElementById('scan-search').value.toUpperCase();
            if(!sym) return;
            document.getElementById('scan-result-box').style.display = "block";
            document.getElementById('scan-res-content').innerHTML = `> SCAN IPDA ${sym} EN COURS...`;
            setTimeout(() => { document.getElementById('scan-res-content').innerHTML = `<b>[${sym}]</b><br>> BALEINES : DÉTECTÉES<br>> FLUX : ACCUMULATION<br>> IPDA : 85% POWER`; }, 1200);
        }

        function lancerRobot() {
            const data = { action: "START", amt: document.getElementById('u-capital').value, exchange: document.getElementById('u-ex').value, market: document.getElementById('u-market').value, ak: document.getElementById('u-key').value, as: document.getElementById('u-sec').value };
            if (window.Telegram.WebApp) window.Telegram.WebApp.sendData(JSON.stringify(data));
            document.getElementById('terminal').innerHTML = "> API OK. MOTEUR SNIPER LANCÉ.";
            document.getElementById('cap-display').innerText = "$" + data.amt;
            document.getElementById('status-text').style.color = "var(--green)";
            showTab('dash', document.getElementById('m-dash'));
        }

        let scene, camera, renderer, globe, stars;
        function init3D() {
            scene = new THREE.Scene(); camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('algo-canvas'), alpha: true, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            globe = new THREE.Mesh(new THREE.IcosahedronGeometry(130, 1), new THREE.MeshBasicMaterial({ color: 0x00ff88, wireframe: true, transparent: true, opacity: 0.3 }));
            scene.add(globe);
            const pts = new Float32Array(800 * 3); for(let i=0; i<800*3; i++) pts[i] = (Math.random()-0.5)*2000;
            const geom = new THREE.BufferGeometry(); geom.setAttribute('position', new THREE.BufferAttribute(pts, 3));
            stars = new THREE.Points(geom, new THREE.PointsMaterial({ size: 2, color: 0x3b82f6, transparent: true, opacity: 0.5 }));
            scene.add(stars); camera.position.z = 450; animate();
        }
        function animate() { requestAnimationFrame(animate); if(globe) { globe.rotation.y += 0.005; globe.rotation.x += 0.002; } renderer.render(scene, camera); }
        window.onload = init3D;
