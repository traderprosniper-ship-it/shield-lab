<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>IFDA PRO SHIELD V65 - GLOBAL MASTER FINAL</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
    :root { --bg: #010101; --card: rgba(10, 10, 10, 0.98); --text: #e2e8f0; --accent: #3b82f6; --green: #00ff88; --red: #ff3333; --gold: #ffd700; --border: #1a1a1a; }
    body, html { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: 'Courier New', monospace; overflow-x: hidden; height: 100%; }
    #algo-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.8; }
    #ifda-bg-text { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 80px; font-weight: 900; color: rgba(59, 130, 246, 0.03); z-index: -1; letter-spacing: 20px; pointer-events: none; }
    
    .lang-selector { position: fixed; top: 10px; right: 10px; z-index: 10000; background: #000; border: 1px solid var(--gold); color: white; border-radius: 5px; padding: 5px; font-size: 12px; cursor: pointer; }
    #lock-screen { position: fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:9999; display:flex; flex-direction:column; align-items:center; justify-content:center; }
    #main-interface { position: relative; z-index: 10; height: 100vh; overflow-y: auto; padding-top: 50px; display: none; }
    
    .nav-tabs { display: grid; grid-template-columns: repeat(3, 1fr); background: rgba(0,0,0,0.95); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 5000; width: 100%; }
    .nav-item { padding: 15px 2px; text-align: center; font-size: 9px; font-weight: bold; cursor: pointer; color: #555; text-transform: uppercase; border-bottom: 2px solid transparent; }
    .nav-item.active { color: var(--accent); border-bottom-color: var(--accent); }

    .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 15px; margin: 10px; backdrop-filter: blur(20px); text-align: center; }
    input, select { width: 100%; background: #000; border: 1px solid var(--border); color: var(--gold); padding: 12px; border-radius: 8px; margin-top: 8px; font-size: 13px; text-align: center; outline: none; }
    label { display: block; font-size: 10px; color: var(--accent); margin-top: 10px; text-align: left; text-transform: uppercase; }
    .btn-action { width: 100%; padding: 15px; background: var(--accent); color: #fff; border: none; font-weight: bold; border-radius: 8px; margin-top: 15px; cursor: pointer; }
    
    .live-screen { background: rgba(0,0,0,0.95); border: 1px solid var(--green); height: 100px; padding: 10px; font-size: 10px; color: var(--green); overflow-y: auto; text-align: left; margin-top: 10px; border-radius: 5px; }
    .status-dot { display: inline-block; width: 8px; height: 8px; background: #555; border-radius: 50%; margin-right: 5px; }
    .status-active { background: var(--green); box-shadow: 0 0 10px var(--green); animation: blink 1.5s infinite; }
    .member { border: 1px solid var(--border); border-left: 4px solid var(--accent); padding: 10px; text-align: left; background: rgba(255,255,255,0.02); border-radius: 5px; margin-top: 5px; }
    </style>
</head>
<body>
    <canvas id="algo-canvas"></canvas>
    <div id="ifda-bg-text">IFDA</div>

    <select class="lang-selector" id="lang-switch" onchange="translateAll(this.value)">
        <option value="fr">🇫🇷 FR</option><option value="en">🇺🇸 EN</option><option value="ar">🇸🇦 AR</option><option value="de">🇩🇪 DE</option><option value="es">🇪🇸 ES</option>
    </select>

    <div id="lock-screen">
        <h2 id="l-title">ACCÈS SÉCURISÉ</h2>
        <input type="password" id="pass-code" placeholder="PIN" maxlength="6" oninput="autoCheck()" style="width:180px;">
        <button class="btn-action" id="btn-login" style="width:180px;" onclick="forceUnlock()">CONNEXION</button>
    </div>

    <div id="main-interface">
        <div class="nav-tabs">
            <div id="m-dash" class="nav-item active" onclick="showTab('dash', this)">DASHBOARD</div>
            <div id="m-scan" class="nav-item" onclick="showTab('scan', this)">SCANNER</div>
            <div id="m-pay" class="nav-item" onclick="showTab('pay', this)">PAIEMENT</div>
        </div>
        <div class="nav-tabs" style="top:40px;">
            <div id="m-inscr" class="nav-item" onclick="showTab('inscr', this)">INSCRIPTION</div>
            <div id="m-macro" class="nav-item" onclick="showTab('macro', this)">MACRO NEWS</div>
            <div id="m-faq" class="nav-item" onclick="showTab('faq', this)">TEAM</div>
        </div>

        <div id="dash" class="content-section">
            <div class="card">
                <div style="text-align: left; margin-bottom: 10px;">
                    <span id="status-light" class="status-dot"></span> <small id="status-text" style="color:#555">DÉCONNECTÉ</small>
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <div><small id="t-cap-dash">CAPITAL ACTIF</small><br><b id="cap-display" style="font-size: 20px; color: var(--gold);">$0.00</b></div>
                    <div><small id="t-ex-dash">ÉCHANGEUR</small><br><b id="ex-display" style="font-size: 16px; color: var(--accent);">WAITING</b></div>
                </div>
                <div id="ny-time" style="font-size: 14px; margin: 15px 0;">NY: --:--:--</div>
                <div class="live-screen" id="terminal">> SANGMELIMA SHIELD READY...</div>
            </div>
        </div>

        <div id="scan" class="content-section" style="display:none;">
            <div class="card">
                <h3 id="t-scan">🔍 SNIPER SCANNER</h3>
                <div class="live-screen" style="height: 250px;" id="full-scan-list"></div>
                <button id="btn-scan-refresh" class="btn-action">RAFRAÎCHIR</button>
            </div>
        </div>

        <div id="inscr" class="content-section" style="display:none;">
            <div class="card">
                <h3 id="t-config-title">📝 CONFIGURATION API</h3>
                <label id="l-cap">CAPITAL TRADING ($)</label>
                <input type="number" id="u-capital" placeholder="...">
                <label id="l-ex">ÉCHANGEUR</label>
                <select id="u-ex">
                    <option value="MEXC">MEXC</option><option value="OKX">OKX</option><option value="BINGX">BINGX</option><option value="KUCOIN">KUCOIN</option><option value="BYBIT">BYBIT</option><option value="GATE IO">GATE IO</option><option value="BINANCE">BINANCE</option><option value="EXNESS">EXNESS</option><option value="VANTAGE FX">VANTAGE FX</option>
                </select>
                <label id="l-mkt">MARCHÉ CIBLE</label>
                <select id="u-market">
                    <option value="PERP">CRYPTO PERPETUAL</option><option value="SPOT">CRYPTO SPOT</option><option value="FOREX">FOREX</option>
                </select>
                <button class="btn-action" id="btn-launch">🚀 LANCER LE BOUCLIER</button>
            </div>
        </div>

        <div id="pay" class="content-section" style="display:none;">
            <div class="card">
                <h3 id="t-pay-title">💳 ACTIVATION SÉCURISÉE</h3>
                <button class="btn-action" id="btn-pay-bot" onclick="window.open('https://t.me/IFDA_SHIELD_BOT')">VALIDER AU BOT</button>
            </div>
        </div>

        <div id="macro" class="content-section" style="display:none;">
            <div class="card"><h3 id="t-macro-title">📢 MACRO NEWS</h3><iframe src="https://sslecal2.investing.com?importance=2,3&countries=5&calType=day&timeZone=12&lang=5" width="100%" height="450" frameborder="0"></iframe></div>
        </div>

        <div id="faq" class="content-section" style="display:none;">
            <div class="card"><h3 id="t-team-title">🛡️ TEAM</h3><div id="team-list"></div></div>
        </div>
    </div>

    <script>
        const WATCHLIST = { "AI": ["FET", "RNDR"], "RWA": ["ONDO", "OM"], "DEPIN": ["FIL", "IOTX"] };

        function autoCheck() {
            let val = document.getElementById('pass-code').value;
            if(val.length === 6) {
                if(val === "197800") doUnlock();
                else document.getElementById('pass-code').value = "";
            }
        }
        function forceUnlock() {
            if(document.getElementById('pass-code').value === "197800") doUnlock();
            else alert("PIN INCORRECT");
        }
        function doUnlock() {
            document.getElementById('lock-screen').style.display = "none"; 
            document.getElementById('main-interface').style.display = "block"; 
            initScanner(); translateAll('fr'); updateTime(); create3DLogo();
        }

        const translations = {
            fr: {
                lTitle: "ACCÈS SÉCURISÉ", btnLogin: "CONNEXION", mDash: "DASHBOARD", mScan: "SCANNER", mPay: "PAIEMENT", mInscr: "INSCRIPTION", mMacro: "MACRO NEWS", mFaq: "TEAM",
                tCap: "CAPITAL ACTIF", tEx: "ÉCHANGEUR", tScan: "🔍 SNIPER SCANNER", btnScan: "RAFRAÎCHIR", tConfig: "📝 CONFIGURATION API", lCap: "CAPITAL ($)", lEx: "ÉCHANGEUR", lMkt: "MARCHÉ CIBLE", btnLaunch: "🚀 LANCER LE BOUCLIER", tPay: "💳 ACTIVATION", btnPay: "VALIDER AU BOT", tMacro: "📢 MACRO NEWS", tTeam: "🛡️ TEAM",
                team: ["👑 NASSER (Fondateur)", "🇨🇲 BERTRAND (Tech)", "🇬🇦 EVA (Manager)", "🇬🇵 MARIE (Analyste)", "🇹🇬 ALBERT (Expert)"]
            },
            en: {
                lTitle: "SECURE ACCESS", btnLogin: "LOGIN", mDash: "DASHBOARD", mScan: "SCANNER", mPay: "PAYMENT", mInscr: "REGISTRATION", mMacro: "MACRO NEWS", mFaq: "TEAM",
                tCap: "ACTIVE CAPITAL", tEx: "EXCHANGE", tScan: "🔍 SNIPER SCANNER", btnScan: "REFRESH", tConfig: "📝 API CONFIGURATION", lCap: "CAPITAL ($)", lEx: "EXCHANGE", lMkt: "TARGET MARKET", btnLaunch: "🚀 LAUNCH SHIELD", tPay: "💳 ACTIVATION", btnPay: "VALIDATE ON BOT", tMacro: "📢 MACRO NEWS", tTeam: "🛡️ TEAM",
                team: ["👑 NASSER (Founder)", "🇨🇲 BERTRAND (Tech)", "🇬🇦 EVA (Manager)", "🇬🇵 MARIE (Analyst)", "🇹🇬 ALBERT (Expert)"]
            },
            ar: {
                lTitle: "دخول آمن", btnLogin: "دخول", mDash: "لوحة التحكم", mScan: "الفاحص", mPay: "الدفع", mInscr: "التسجيل", mMacro: "الأخبار", mFaq: "الفريق",
                tCap: "رأس المال", tEx: "المنصة", tScan: "🔍 فاحص القناص", btnScan: "تحديث", tConfig: "📝 إعدادات API", lCap: "رأس المال ($)", lEx: "المنصة", lMkt: "السوق المستهدف", btnLaunch: "🚀 إطلاق الدرع", tPay: "💳 تفعيل", btnPay: "تأكيد في البوت", tMacro: "📢 أخبار", tTeam: "🛡️ الفريق",
                team: ["👑 ناصر (المؤسس)", "🇨🇲 برتراند", "🇬🇦 إيفا", "🇬🇵 ماري", "🇹🇬 ألبرت"]
            },
            es: {
                lTitle: "ACCESO SEGURO", btnLogin: "ACCEDER", mDash: "TABLERO", mScan: "ESCANER", mPay: "PAGO", mInscr: "REGISTRO", mMacro: "NOTICIAS", mFaq: "EQUIPO",
                tCap: "CAPITAL ACTIVO", tEx: "EXCHANGE", tScan: "🔍 ESCANER SNIPER", btnScan: "REFRESCAR", tConfig: "📝 CONFIGURACIÓN API", lCap: "CAPITAL ($)", lEx: "EXCHANGE", lMkt: "MERCADO", btnLaunch: "🚀 LANZAR ESCUDO", tPay: "💳 ACTIVACIÓN", btnPay: "VALIDAR", tMacro: "📢 NOTICIAS", tTeam: "🛡️ EQUIPO",
                team: ["👑 NASSER (Fundador)", "🇨🇲 BERTRAND", "🇬🇦 EVA", "🇬🇵 MARIE", "🇹🇬 ALBERT"]
            },
            de: {
                lTitle: "ZUGANG", btnLogin: "LOGIN", mDash: "DASHBOARD", mScan: "SCANNER", mPay: "ZAHLUNG", mInscr: "ANMELDUNG", mMacro: "MAKRO NEWS", mFaq: "TEAM",
                tCap: "KAPITAL", tEx: "BÖRSE", tScan: "🔍 SNIPER SCANNER", btnScan: "AKTUALISIEREN", tConfig: "📝 API KONFIG", lCap: "KAPITAL ($)", lEx: "BÖRSE", lMkt: "MARKT", btnLaunch: "🚀 START", tPay: "💳 AKTIVIERUNG", btnPay: "VALIDIEREN", tMacro: "📢 MAKRO NEWS", tTeam: "🛡️ TEAM",
                team: ["👑 NASSER (Gründer)", "🇨🇲 BERTRAND", "🇬🇦 EVA", "🇬🇵 MARIE", "🇹🇬 ALBERT"]
            }
        };

        function translateAll(lang) {
            const d = translations[lang] || translations['fr'];
            document.getElementById('l-title').innerText = d.lTitle;
            document.getElementById('btn-login').innerText = d.btnLogin;
            document.getElementById('m-dash').innerText = d.mDash;
            document.getElementById('m-scan').innerText = d.mScan;
            document.getElementById('m-pay').innerText = d.mPay;
            document.getElementById('m-inscr').innerText = d.mInscr;
            document.getElementById('m-macro').innerText = d.mMacro;
            document.getElementById('m-faq').innerText = d.mFaq;
            document.getElementById('t-cap-dash').innerText = d.tCap;
            document.getElementById('t-ex-dash').innerText = d.tEx;
            document.getElementById('t-scan').innerText = d.tScan;
            document.getElementById('btn-scan-refresh').innerText = d.btnScan;
            document.getElementById('t-config-title').innerText = d.tConfig;
            document.getElementById('l-cap').innerText = d.lCap;
            document.getElementById('l-ex').innerText = d.lEx;
            document.getElementById('l-mkt').innerText = d.lMkt;
            document.getElementById('btn-launch').innerText = d.btnLaunch;
            document.getElementById('t-pay-title').innerText = d.tPay;
            document.getElementById('btn-pay-bot').innerText = d.btnPay;
            document.getElementById('t-macro-title').innerText = d.tMacro;
            document.getElementById('t-team-title').innerText = d.tTeam;
            let tHtml = ""; d.team.forEach(m => tHtml += `<div class="member"><b>${m}</b></div>`);
            document.getElementById('team-list').innerHTML = tHtml;
            document.body.style.direction = (lang === 'ar') ? 'rtl' : 'ltr';
        }

        function initScanner() {
            let h = ""; for(let c in WATCHLIST) {
                h += `<div style="color:var(--gold); margin-top:10px;">${c}</div>`;
                WATCHLIST[c].forEach(coin => h += `<div style="display:flex; justify-content:space-between; border-bottom:1px solid #111;"><span>${coin}</span><span>WAIT...</span></div>`);
            }
            document.getElementById('full-scan-list').innerHTML = h;
        }

        function showTab(id, el) { 
            document.querySelectorAll('.content-section').forEach(s => s.style.display='none'); 
            document.getElementById(id).style.display='block'; 
            document.querySelectorAll('.nav-tabs .nav-item').forEach(i => i.classList.remove('active')); 
            el.classList.add('active'); 
        }

        function updateTime() { document.getElementById('ny-time').innerText = "NY: " + new Date().toLocaleTimeString('fr-FR', {timeZone:'America/New_York'}); setTimeout(updateTime, 1000); }

        let logo3D; const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('algo-canvas'), alpha: true, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        function create3DLogo() {
            logo3D = new THREE.Group();
            const mat = new THREE.MeshBasicMaterial({ color: 0x00ff88, wireframe: true });
            const core = new THREE.Mesh(new THREE.IcosahedronGeometry(120, 1), mat);
            logo3D.add(core); scene.add(logo3D); camera.position.z = 500; animate();
        }
        function animate() { requestAnimationFrame(animate); if(logo3D) { logo3D.rotation.y += 0.01; logo3D.rotation.x += 0.005; } renderer.render(scene, camera); }
    </script>
</body>
                             </html>
