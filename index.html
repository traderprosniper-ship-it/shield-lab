<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>SANGMELIMA SHIELD V45 - MONITORING TEMPS RÉEL</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root { --bg: #010101; --card: rgba(10, 10, 10, 0.98); --text: #e2e8f0; --accent: #3b82f6; --green: #00ff88; --red: #ff3333; --gold: #ffd700; --border: #1a1a1a; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; overflow-x: hidden; height: 100%; }
        #algo-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        #main-interface { position: relative; z-index: 10; height: 100vh; overflow-y: auto; padding-bottom: 120px; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 15px; margin: 10px; backdrop-filter: blur(20px); }
        .nav-tabs { display: grid; grid-template-columns: repeat(3, 1fr); background: rgba(0,0,0,0.95); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
        .nav-item { padding: 12px 2px; text-align: center; font-size: 9px; font-weight: bold; cursor: pointer; color: #555; border-bottom: 2px solid transparent; }
        .nav-item.active { color: var(--accent); border-bottom-color: var(--accent); }
        input, select { width: 100%; background: #000; border: 1px solid var(--border); color: #fff; padding: 12px; border-radius: 8px; margin-top: 8px; outline: none; font-size: 14px; }
        .btn-action { width: 100%; padding: 15px; background: var(--accent); color: #fff; border: none; font-weight: bold; border-radius: 8px; margin-top: 15px; cursor: pointer; }
        
        /* TERMINAL ET MONITORING */
        .live-screen { background: rgba(0,0,0,0.95); border: 1px solid var(--green); height: 120px; padding: 10px; font-size: 10px; color: var(--green); font-family: 'Courier New', monospace; overflow-y: auto; margin-top: 5px; text-align: left; box-shadow: inset 0 0 10px rgba(0,255,136,0.2); }
        .scan-bar { background: #050505; border: 1px solid #222; padding: 8px; border-radius: 6px; margin-top: 15px; display: flex; align-items: center; justify-content: space-between; }
        .scanning-text { font-size: 9px; color: var(--accent); font-weight: bold; }
        #active-asset { color: var(--gold); font-family: monospace; animation: blink 0.8s infinite; }
        @keyframes blink { 0% {opacity: 1;} 50% {opacity: 0.3;} 100% {opacity: 1;} }

        /* KILLZONES DYNAMIQUES */
        .kz-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 12px; }
        .kz-item { padding: 6px; background: #050505; border: 1px solid #222; border-radius: 6px; font-size: 8px; transition: 0.5s; color: #444; text-align: center; }
        .kz-active { border-color: var(--green); color: var(--green) !important; font-weight: bold; animation: pulseKz 2s infinite; }
        @keyframes pulseKz { 0% {opacity: 1;} 50% {opacity: 0.5;} 100% {opacity: 1;} }
        #local-clock { font-family: monospace; color: var(--text); font-size: 10px; margin-top: 5px; opacity: 0.7; }
    </style>
</head>
<body>
    <canvas id="algo-canvas"></canvas>

    <div id="main-interface">
        <div class="lang-bar">
            <select onchange="changeLanguage(this.value)">
                <option value="fr">🇫🇷 FR</option><option value="en">🇺🇸 EN</option><option value="de">🇩🇪 DE</option><option value="es">🇪🇸 ES</option><option value="ar">🇸🇦 AR</option>
            </select>
        </div>

        <div class="nav-tabs">
            <div class="nav-item active" id="t-dash" onclick="showTab('dash', this)">DASHBOARD</div>
            <div class="nav-item" id="t-scan" onclick="showTab('scan', this)">SCANNER</div>
            <div class="nav-item" id="t-pay" onclick="showTab('pay', this)">PAIEMENT</div>
        </div>

        <div id="dash" class="content-section">
            <div class="card" style="text-align: center;">
                <div id="txt-cap" style="font-size: 8px; color: #777;">SMC CAPITAL ALLOCATION</div>
                <div id="bal-val" style="font-size: 45px; font-weight: bold; color: var(--gold); margin: 5px 0;">$0.00</div>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:15px;">
                    <div style="background:#050505; border-radius:10px; border:1px solid #222; padding:10px;">
                        <small style="font-size:7px; color:#555;">PNL LIVE</small><br><b id="pnl-val" style="color:var(--green); font-size:20px;">+$0.00</b>
                    </div>
                    <div style="background:#050505; border-radius:10px; border:1px solid #222; padding:10px;">
                        <small id="txt-stat" style="font-size:7px; color:#555;">STATUS</small><br><b id="robot-status" style="color:var(--red); font-size:14px;">INACTIF</b>
                    </div>
                </div>

                <div style="margin-top:15px; border-top: 1px solid #111; padding-top: 10px;">
                    <div id="ny-time" style="font-size: 14px; color: var(--accent); font-weight: bold; font-family: monospace;">NY: 00:00:00</div>
                    <div id="local-clock">LOC: 00:00:00</div>
                    <div class="kz-grid">
                        <div class="kz-item" id="kz-asia">🌏 ASIAN</div>
                        <div class="kz-item" id="kz-london">🇬🇧 LONDON</div>
                        <div class="kz-item" id="kz-nyam">🇺🇸 NY AM</div>
                        <div class="kz-item" id="kz-nypm">🇺🇸 NY PM</div>
                    </div>
                </div>

                <div class="scan-bar">
                    <span class="scanning-text">🔍 ANALYSE ALGORITHMIQUE :</span>
                    <span id="active-asset">EN ATTENTE</span>
                </div>

                <div class="live-screen" id="terminal">> SANGMELIMA SHIELD V45 STANDBY...</div>
            </div>
        </div>

        <div id="inscr" class="content-section" style="display:none;">
            <div class="card">
                <h3 style="font-size:11px; color:var(--accent); text-align:center;">🛡️ CONFIGURATION DU LABO SANGMELIMA</h3>
                <select id="market-type"><option value="SPOT">MOTEUR SPOT (Crypto)</option><option value="PERP">MOTEUR PERPÉTUEL</option><option value="FOREX_INDICES">MOTEUR FOREX</option></select>
                <select id="ex-s"><option value="OKX">OKX</option><option value="BINGX">BINGX</option><option value="EXNESS">EXNESS</option><option value="BINANCE">BINANCE</option></select>
                <input type="password" id="ak" placeholder="API KEY / ID COMPTE">
                <input type="password" id="as" placeholder="SECRET KEY">
                <input type="password" id="ap" placeholder="PASSPHRASE (OKX)">
                <input type="number" id="tr-amount" placeholder="MONTANT PAR TRADE ($)">
                <button id="btn-launch" class="btn-action" onclick="activateEngine()">🚀 DÉPLOYER LE CERVEAU VIVANT</button>
            </div>
        </div>
        </div>

    <script>
        const tg = window.Telegram.WebApp; tg.expand();
        
        // LISTE DES 30 ACTIFS POUR L'ANIMATION DU DASHBOARD
        const assets = ["NAS100", "US30", "XAUUSD", "BTCUSD", "ETHUSD", "SOLUSD", "ONDO", "FET", "RNDR", "INJ", "TIA", "SUI", "SEI", "APT", "OP", "ARB", "LDO", "AVAX", "NEAR", "DOT", "LINK", "MATIC", "PEPE", "WIF", "SHIB", "DOGE", "GER40", "FRA40", "SPX500", "XAGUSD"];
        let assetIdx = 0;

        function logToTerminal(msg, color = "var(--green)") {
            const term = document.getElementById('terminal');
            const time = new Date().toLocaleTimeString();
            term.innerHTML = `<span style="color:grey">[${time}]</span> <span style="color:${color}">${msg}</span><br>` + term.innerHTML;
        }

        function updateScannerDisplay() {
            if(localStorage.getItem('shield_active') === 'true') {
                document.getElementById('active-asset').innerText = assets[assetIdx];
                assetIdx = (assetIdx + 1) % assets.length;
            }
        }

        function activateEngine() {
            const amt = document.getElementById('tr-amount').value;
            const market = document.getElementById('market-type').value;
            if(!amt || amt <= 0) return alert("Entrer un montant");
            
            localStorage.setItem('shield_amt', amt);
            localStorage.setItem('shield_market', market);
            localStorage.setItem('shield_active', 'true');

            document.getElementById('bal-val').innerText = "$" + parseFloat(amt).toFixed(2);
            document.getElementById('robot-status').innerText = "VIGILANT (" + market + ")";
            document.getElementById('robot-status').style.color = "var(--green)";
            
            logToTerminal(`CERVEAU VIVANT DÉPLOYÉ...`, "var(--accent)");
            tg.sendData(JSON.stringify({ action: "START", market, amt, exchange: document.getElementById('ex-s').value, ak: document.getElementById('ak').value, as: document.getElementById('as').value, ap: document.getElementById('ap').value }));
            showTab('dash', document.getElementById('t-dash'));
        }

        // MISE À JOUR TOUTES LES 2 SECONDES POUR LE SCANNER
        setInterval(updateScannerDisplay, 2000);

        // HORLOGE ET KILLZONES
        setInterval(() => {
            const now = new Date();
            const ny = new Intl.DateTimeFormat('en-US', { timeZone: 'America/New_York', hour: 'numeric', minute: 'numeric', second: 'numeric', hour12: false });
            const p = ny.formatToParts(now);
            const h = parseInt(p.find(it => it.type === 'hour').value);
            document.getElementById('ny-time').innerText = `NY: ${h}:${p.find(it => it.type === 'minute').value}:${p.find(it => it.type === 'second').value}`;
            document.getElementById('local-clock').innerText = `LOC: ${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}:${now.getSeconds().toString().padStart(2, '0')}`;
            
            document.querySelectorAll('.kz-item').forEach(el => el.classList.remove('kz-active'));
            if (h >= 20 || h < 0) document.getElementById('kz-asia').classList.add('kz-active');
            if (h >= 2 && h < 5) document.getElementById('kz-london').classList.add('kz-active');
            if (h >= 7 && h < 10) document.getElementById('kz-nyam').classList.add('kz-active');
            if (h >= 13 && h < 16) document.getElementById('kz-nypm').classList.add('kz-active');
        }, 1000);

        // [Le reste du code JS : navigation, FAQ, Three.js reste identique]
        function showTab(id, el) {
            document.querySelectorAll('.content-section').forEach(s => s.style.display = 'none');
            document.getElementById(id).style.display = 'block';
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            if(el) el.classList.add('active');
        }

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('algo-canvas'), alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        const geo = new THREE.BufferGeometry(); const pts = [];
        for(let i=0; i<600; i++) pts.push(THREE.MathUtils.randFloatSpread(2000), THREE.MathUtils.randFloatSpread(2000), THREE.MathUtils.randFloatSpread(2000));
        geo.setAttribute('position', new THREE.Float32BufferAttribute(pts, 3));
        const mat = new THREE.Points(geo, new THREE.PointsMaterial({color: 0x3b82f6, size: 2}));
        scene.add(mat); camera.position.z = 500;
        function animate() { requestAnimationFrame(animate); mat.rotation.y += 0.001; renderer.render(scene, camera); } animate();
    </script>
</body>
</html>
