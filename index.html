<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>IFDA V45 - SANGMELIMA SHIELD LAB</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root { --bg: #010101; --card: rgba(8, 8, 8, 0.9); --text: #e2e8f0; --accent: #3b82f6; --green: #00ff88; --red: #ff3333; --gold: #ffd700; --border: #151515; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; overflow: hidden; height: 100%; }
        #algo-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 10000; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        #main-interface { display: none; position: relative; z-index: 10; height: 100vh; overflow-y: auto; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 15px; margin: 10px; backdrop-filter: blur(15px); }
        .nav-tabs { display: grid; grid-template-columns: repeat(3, 1fr); background: rgba(0,0,0,0.9); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 20; }
        .nav-item { padding: 12px 2px; text-align: center; font-size: 9px; font-weight: bold; cursor: pointer; color: #666; border-bottom: 2px solid transparent; }
        .nav-item.active { color: var(--accent); border-bottom-color: var(--accent); }
        .kz-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; margin-top: 10px; }
        .kz-box { border: 1px solid #222; padding: 5px; border-radius: 4px; font-size: 8px; text-align: center; opacity: 0.3; color: var(--accent); }
        .kz-box.active { opacity: 1; border-color: var(--accent); box-shadow: 0 0 8px var(--accent); font-weight: bold; }
        input, select { width: 100%; background: rgba(15,15,15,0.8); border: 1px solid var(--border); color: #fff; padding: 12px; border-radius: 8px; margin-top: 8px; font-size: 13px; outline: none; }
        .btn-action { width: 100%; padding: 15px; background: var(--accent); color: #fff; border: none; font-weight: bold; border-radius: 8px; cursor: pointer; margin-top: 15px; }
        .live-screen { background: #000; border: 1px solid var(--green); height: 80px; padding: 10px; font-size: 10px; color: var(--green); font-family: monospace; overflow-y: hidden; margin-top: 10px; }
    </style>
</head>
<body>
    <canvas id="algo-canvas"></canvas>

    <div id="login-screen">
        <div class="card" style="width: 280px; text-align: center;">
            <h2 style="font-size: 12px; color: var(--accent);">IFDA ENGINE ACCESS</h2>
            <input type="password" id="accessCode" placeholder="CODE SECRET" inputmode="numeric">
            <button id="txt-login-btn" class="btn-action" onclick="checkCode()">DÉVERROUILLER LE LABO</button>
        </div>
    </div>

    <div id="main-interface">
        <div class="nav-tabs">
            <div class="nav-item active" onclick="showTab('dash', this)">DASHBOARD</div>
            <div class="nav-item" onclick="showTab('scan', this)">SCANNER</div>
            <div class="nav-item" onclick="showTab('inscr', this)">INSCRIPTION</div>
        </div>

        <div id="dash" class="content-section">
            <div class="card" style="text-align: center;">
                <div style="font-size: 8px; color: #777;">SMC CAPITAL ALLOCATION</div>
                <div id="bal-val" style="font-size: 35px; font-weight: bold; color: var(--gold);">$0.00</div>
                <div id="robot-status" style="color: var(--red); font-size: 10px; font-weight: bold;">SYSTEM IDLE</div>
                <div id="ny-time" style="font-size: 10px; color: var(--accent); margin-top: 5px;">NY: 00:00:00</div>
                <div class="kz-grid">
                    <div id="kz-asia" class="kz-box">ASIA</div>
                    <div id="kz-london" class="kz-box">LDN</div>
                    <div id="kz-ny-am" class="kz-box">NY-AM</div>
                    <div id="kz-ny-pm" class="kz-box">NY-PM</div>
                </div>
                <div class="live-screen" id="terminal">> WAITING FOR ACTIVATION...</div>
            </div>
        </div>

        <div id="inscr" class="content-section" style="display:none;">
            <div class="card">
                <h3 style="font-size: 12px; color: var(--accent);">CONFIGURATION DU BOUCLIER</h3>
                <select id="market-type">
                    <option value="PERP">MARCHÉ PERPÉTUEL (FUTURES)</option>
                    <option value="SPOT">MARCHÉ SPOT (COMPTANT)</option>
                </select>
                <select id="ex-s">
                    <option>BINANCE</option><option>BYBIT</option><option>BITGET</option>
                    <option>GATE.IO</option><option>BINGX</option><option>KUCOIN</option>
                    <option>OKX</option><option>MEXC</option>
                </select>
                <input type="password" id="ak" placeholder="API KEY">
                <input type="password" id="as" placeholder="SECRET KEY">
                <input type="number" id="tr-amount" placeholder="CAPITAL ($)">
                <button class="btn-action" onclick="activateEngine()">LANCER LE BOUCLIER</button>
            </div>
        </div>

        <div id="scan" class="content-section" style="display:none;">
            <div class="card">
                <h3 style="font-size: 12px; color: var(--accent);">SCANNER SMC/ICT</h3>
                <input type="text" id="s-input" placeholder="SYMBOLE (ex: BTC)">
                <button class="btn-action" onclick="runScan()">DÉTECTER LIQUIDITÉ (SWEEP)</button>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        function checkCode() {
            const val = document.getElementById('accessCode').value.trim();
            if(val === "197800") {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-interface').style.display = 'block';
                if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
            } else {
                alert("CODE INVALIDE");
            }
        }

        function showTab(id, el) {
            document.querySelectorAll('.content-section').forEach(s => s.style.display = 'none');
            document.getElementById(id).style.display = 'block';
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
        }

        function activateEngine() {
            const m = document.getElementById('market-type').value;
            const amt = document.getElementById('tr-amount').value;
            document.getElementById('bal-val').innerText = "$" + parseFloat(amt || 0).toFixed(2);
            document.getElementById('robot-status').innerText = "ACTIVE - " + m;
            document.getElementById('robot-status').style.color = "var(--green)";
            showTab('dash', document.querySelector('.nav-item'));
            const term = document.getElementById('terminal');
            term.innerHTML = "> Engine Started...<br>> Market: " + m + "<br>> Connecting API...";
        }

        // --- SESSIONS NY TIME & KILLZONES ---
        function updateClock() {
            const ny = new Date(new Date().toLocaleString("en-US", {timeZone: "America/New_York"}));
            const h = ny.getHours();
            document.getElementById('ny-time').innerText = "NY: " + ny.toTimeString().split(' ')[0];
            document.querySelectorAll('.kz-box').forEach(b => b.classList.remove('active'));
            if (h >= 20 || h < 0) document.getElementById('kz-asia').classList.add('active');
            if (h >= 2 && h < 5) document.getElementById('kz-london').classList.add('active');
            if (h >= 8 && h < 11) document.getElementById('kz-ny-am').classList.add('active');
            if (h >= 13 && h < 16) document.getElementById('kz-ny-pm').classList.add('active');
        }
        setInterval(updateClock, 1000);

        // --- BACKGROUND ANIMATION ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('algo-canvas'), alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        const geo = new THREE.BufferGeometry();
        const verts = [];
        for (let i = 0; i < 3000; i++) verts.push(THREE.MathUtils.randFloatSpread(2000), THREE.MathUtils.randFloatSpread(2000), THREE.MathUtils.randFloatSpread(2000));
        geo.setAttribute('position', new THREE.Float32BufferAttribute(verts, 3));
        const pts = new THREE.Points(geo, new THREE.PointsMaterial({ color: 0x3b82f6, size: 2 }));
        scene.add(pts);
        camera.position.z = 500;
        function animate() { requestAnimationFrame(animate); pts.rotation.y += 0.001; renderer.render(scene, camera); }
        animate();
    </script>
</body>
                    </html>
